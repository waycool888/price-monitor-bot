name: Price Monitor Engine

on:
  schedule:
    # 03:00 UTC = 11:00 AM SGT | 07:00 UTC = 3:00 PM SGT
    # 1-5 specifies execution exclusively on Monday, Tuesday, Wednesday, Thursday, and Friday.
    - cron: '18 3,7 * * 1-5'
  workflow_dispatch: # Keeps manual button available for diagnostic checks

jobs:
  execute-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v6

    - name: Set Up Python Environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Monitor Script
      env:
        FOREX_API_KEY: ${{ secrets.FOREX_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
      
